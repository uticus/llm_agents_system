# Local development stack: the app plus an observability backend.
# Run from the project root:  docker compose -f deploy/docker-compose.yml up
services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      LLM_AGENTS_ENVIRONMENT: dev
      LLM_AGENTS_LOG_LEVEL: INFO
      # Point tracing at the collector below.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      - otel-collector

  # Receives traces/metrics (OTLP) from the app.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ../configs/observability/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC

  # Scrapes metrics; dashboards live in Grafana.
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ../configs/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
